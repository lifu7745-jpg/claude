<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>对话</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=DM+Mono:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --text: #111111; --text-muted: #aaaaaa;
    --border: #ebebeb; --user-bg: #f4f4f4; --accent: #111111; --radius: 18px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Serif SC', serif; font-weight: 300; -webkit-font-smoothing: antialiased; }
  body { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; position: relative; overflow: hidden; }
  .header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: var(--bg); z-index: 10; }
  .header-title { font-size: 14px; letter-spacing: 0.1em; color: var(--text-muted); }
  .header-actions { display: flex; align-items: center; gap: 14px; }
  .icon-btn { background: none; border: none; cursor: pointer; padding: 4px; color: var(--text-muted); line-height: 1; -webkit-tap-highlight-color: transparent; transition: color 0.2s; font-size: 18px; }
  .icon-btn:active { color: var(--text); }
  .txt-btn { font-size: 12px; font-family: 'DM Mono', monospace; letter-spacing: 0.04em; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ddd; transition: background 0.3s; }
  .status-dot.on { background: #4caf50; }
  .messages { flex: 1; overflow-y: auto; padding: 24px 18px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { display: none; }
  .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; color: var(--text-muted); font-size: 12px; letter-spacing: 0.08em; pointer-events: none; }
  .empty-glyph { font-size: 26px; opacity: 0.25; font-family: 'DM Mono', monospace; }
  .msg { display: flex; flex-direction: column; gap: 4px; animation: fadeUp 0.25s ease forwards; opacity: 0; }
  .msg.user { align-items: flex-end; }
  .msg.ai { align-items: flex-start; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(7px); } to { opacity:1; transform:translateY(0); } }
  .bubble { max-width: 84%; padding: 11px 15px; font-size: 15px; line-height: 1.75; white-space: pre-wrap; word-break: break-word; }
  .msg.user .bubble { background: var(--user-bg); border-radius: var(--radius) var(--radius) 4px var(--radius); }
  .msg.ai .bubble { background: transparent; padding-left: 2px; }
  .msg-time { font-size: 10px; color: var(--text-muted); font-family: 'DM Mono', monospace; padding: 0 3px; }
  .typing { display: flex; gap: 5px; align-items: center; padding: 10px 2px; }
  .typing span { width: 5px; height: 5px; border-radius: 50%; background: #ccc; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-5px); } }
  .input-area { padding: 10px 14px 18px; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--bg); }
  .input-row { display: flex; align-items: flex-end; gap: 10px; background: var(--user-bg); border-radius: 24px; padding: 10px 12px 10px 16px; }
  textarea { flex: 1; background: transparent; border: none; outline: none; resize: none; font-family: 'Noto Serif SC', serif; font-weight: 300; font-size: 15px; line-height: 1.6; color: var(--text); max-height: 110px; overflow-y: auto; -webkit-appearance: none; }
  textarea::placeholder { color: var(--text-muted); }
  textarea::-webkit-scrollbar { display: none; }
  .send-btn { width: 33px; height: 33px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s, transform 0.15s; -webkit-tap-highlight-color: transparent; }
  .send-btn:active { transform: scale(0.9); }
  .send-btn:disabled { opacity: 0.2; cursor: default; }
  .send-btn svg { width: 15px; height: 15px; fill: none; stroke: white; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  .panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.08); z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .panel-overlay.open { opacity: 1; pointer-events: all; }
  .memory-panel { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%); width: 100%; max-width: 480px; background: var(--bg); border-radius: 20px 20px 0 0; border-top: 1px solid var(--border); z-index: 51; transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); display: flex; flex-direction: column; max-height: 80dvh; }
  .memory-panel.open { transform: translateX(-50%) translateY(0); }
  .panel-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 12px auto 0; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid var(--border); }
  .panel-title { font-size: 14px; letter-spacing: 0.08em; color: var(--text-muted); }
  .panel-close { background: none; border: none; font-size: 22px; color: var(--text-muted); cursor: pointer; padding: 2px; line-height: 1; -webkit-tap-highlight-color: transparent; }
  .memory-body { flex: 1; overflow-y: auto; padding: 16px 20px 8px; }
  .memory-body::-webkit-scrollbar { display: none; }
  .memory-textarea { width: 100%; min-height: 160px; border: none; outline: none; resize: none; font-family: 'Noto Serif SC', serif; font-weight: 300; font-size: 14px; line-height: 1.9; color: var(--text); background: transparent; -webkit-appearance: none; }
  .memory-textarea::placeholder { color: var(--text-muted); }
  .panel-footer { padding: 12px 20px 28px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .memory-hint { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; line-height: 1.6; }
  .save-btn { background: var(--accent); color: white; border: none; border-radius: 10px; padding: 10px 22px; font-size: 13px; font-family: 'Noto Serif SC', serif; font-weight: 300; letter-spacing: 0.06em; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
  .save-btn:active { opacity: 0.7; }
  .saved-flash { font-size: 11px; color: #4caf50; font-family: 'DM Mono', monospace; opacity: 0; transition: opacity 0.3s; margin-top: 4px; }
  .saved-flash.show { opacity: 1; }
  .setup-overlay { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 32px; gap: 16px; animation: fadeUp 0.35s ease forwards; }
  .setup-overlay h2 { font-size: 17px; font-weight: 300; letter-spacing: 0.06em; text-align: center; }
  .setup-overlay p { font-size: 12px; color: var(--text-muted); text-align: center; line-height: 1.9; max-width: 280px; }
  .setup-input { width: 100%; max-width: 320px; border: 1px solid var(--border); border-radius: 12px; padding: 13px 16px; font-size: 13px; font-family: 'DM Mono', monospace; outline: none; color: var(--text); background: var(--bg); transition: border-color 0.2s; }
  .setup-input:focus { border-color: var(--accent); }
  .setup-btn { width: 100%; max-width: 320px; background: var(--accent); color: white; border: none; border-radius: 12px; padding: 14px; font-size: 14px; font-family: 'Noto Serif SC', serif; font-weight: 300; letter-spacing: 0.08em; cursor: pointer; transition: opacity 0.2s; -webkit-tap-highlight-color: transparent; }
  .setup-btn:active { opacity: 0.7; }
  .setup-btn:disabled { opacity: 0.3; }
  .error-msg { font-size: 11px; color: #e05555; text-align: center; font-family: 'DM Mono', monospace; min-height: 14px; }
</style>
</head>
<body>
<div class="setup-overlay" id="setupOverlay">
  <div class="empty-glyph" style="font-size:28px;opacity:0.2;font-family:'DM Mono',monospace">◌</div>
  <h2>连接 API</h2>
  <p>输入你的 API 地址和 Key，仅保存在本设备。</p>
  <input class="setup-input" id="apiUrlInput" type="url" placeholder="https://api.linkapi.ai/v1" autocomplete="off" spellcheck="false">
  <input class="setup-input" id="apiKeyInput" type="password" placeholder="API Key" autocomplete="off" spellcheck="false">
  <div class="error-msg" id="setupError"></div>
  <button class="setup-btn" id="saveKeyBtn">开始对话</button>
</div>
<div class="header">
  <span class="header-title">对话</span>
  <div class="header-actions">
    <button class="icon-btn" id="memoryBtn">📖</button>
    <button class="icon-btn txt-btn" id="clearBtn">清空</button>
    <div class="status-dot" id="statusDot"></div>
  </div>
</div>
<div class="messages" id="messages">
  <div class="empty-state" id="emptyState">
    <div class="empty-glyph">◌</div>
    <span>开始输入</span>
  </div>
</div>
<div class="input-area">
  <div class="input-row">
    <textarea id="inputBox" placeholder="说点什么…" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" disabled>
      <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
    </button>
  </div>
</div>
<div class="panel-overlay" id="panelOverlay"></div>
<div class="memory-panel" id="memoryPanel">
  <div class="panel-handle"></div>
  <div class="panel-header">
    <span class="panel-title">记忆本</span>
    <button class="panel-close" id="panelClose">×</button>
  </div>
  <div class="memory-body">
    <textarea class="memory-textarea" id="memoryText" placeholder="写下你想让 Claude 记住的事…

比如：
· 我叫小美，喜欢猫
· 请用轻松的语气跟我说话
· 不要加 emoji
· 回复不要太长"></textarea>
  </div>
  <div class="panel-footer">
    <div>
      <div class="memory-hint">每次对话都会带入这里的内容</div>
      <div class="saved-flash" id="savedFlash">已保存 ✓</div>
    </div>
    <button class="save-btn" id="saveMemoryBtn">保存</button>
  </div>
</div>
<script>
  const MODEL = 'claude-sonnet-4-20250514';
  let apiUrl = localStorage.getItem('chat_api_url') || '';
  let apiKey = localStorage.getItem('chat_api_key') || '';
  let history = [], isLoading = false;
  const $ = id => document.getElementById(id);
  const setupOverlay=$('setupOverlay'),apiUrlInput=$('apiUrlInput'),apiKeyInput=$('apiKeyInput'),saveKeyBtn=$('saveKeyBtn'),setupError=$('setupError');
  const messagesEl=$('messages'),emptyState=$('emptyState'),inputBox=$('inputBox'),sendBtn=$('sendBtn'),statusDot=$('statusDot');
  const clearBtn=$('clearBtn'),memoryBtn=$('memoryBtn'),panelOverlay=$('panelOverlay'),memoryPanel=$('memoryPanel'),panelClose=$('panelClose');
  const memoryText=$('memoryText'),saveMemoryBtn=$('saveMemoryBtn'),savedFlash=$('savedFlash');
  function init() {
    if (apiKey && apiUrl) { setupOverlay.style.display='none'; statusDot.classList.add('on'); }
    memoryText.value = localStorage.getItem('chat_memory') || '';
  }
  saveKeyBtn.addEventListener('click', async () => {
    let url = apiUrlInput.value.trim().replace(/\/$/, '');
    const key = apiKeyInput.value.trim();
    if (!url) { setupError.textContent='请输入 API 地址'; return; }
    if (!key) { setupError.textContent='请输入 API Key'; return; }
    if (!url.endsWith('/v1')) url += '/v1';
    saveKeyBtn.disabled=true; saveKeyBtn.textContent='连接中…'; setupError.textContent='';
    try {
      const res = await fetch(url+'/messages', { method:'POST', headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'}, body:JSON.stringify({model:MODEL,max_tokens:10,messages:[{role:'user',content:'hi'}]}) });
      if (res.status===401||res.status===403) throw new Error('Key 无效或没有权限');
      apiUrl=url; apiKey=key; localStorage.setItem('chat_api_url',url); localStorage.setItem('chat_api_key',key);
      setupOverlay.style.display='none'; statusDot.classList.add('on');
    } catch(e) { setupError.textContent=e.message||'连接失败，检查地址和 Key'; saveKeyBtn.disabled=false; saveKeyBtn.textContent='开始对话'; }
  });
  memoryBtn.addEventListener('click', ()=>{ panelOverlay.classList.add('open'); memoryPanel.classList.add('open'); });
  const closePanel = ()=>{ panelOverlay.classList.remove('open'); memoryPanel.classList.remove('open'); };
  panelClose.addEventListener('click', closePanel);
  panelOverlay.addEventListener('click', closePanel);
  saveMemoryBtn.addEventListener('click', ()=>{ localStorage.setItem('chat_memory',memoryText.value); savedFlash.classList.add('show'); setTimeout(()=>savedFlash.classList.remove('show'),1800); });
  inputBox.addEventListener('input', ()=>{ inputBox.style.height='auto'; inputBox.style.height=Math.min(inputBox.scrollHeight,110)+'px'; sendBtn.disabled=!inputBox.value.trim()||isLoading; });
  inputBox.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); if(!sendBtn.disabled) sendMessage(); } });
  sendBtn.addEventListener('click', sendMessage);
  clearBtn.addEventListener('click', ()=>{ history=[]; messagesEl.innerHTML=''; messagesEl.appendChild(emptyState); emptyState.style.display='flex'; });
  function getTime() { const d=new Date(); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }
  function addMessage(role, text) {
    emptyState.style.display='none';
    const msg=document.createElement('div'); msg.className=`msg ${role}`;
    const bubble=document.createElement('div'); bubble.className='bubble'; bubble.textContent=text;
    const time=document.createElement('div'); time.className='msg-time'; time.textContent=getTime();
    msg.appendChild(bubble); msg.appendChild(time); messagesEl.appendChild(msg); messagesEl.scrollTop=messagesEl.scrollHeight;
  }
  function addTyping() { emptyState.style.display='none'; const msg=document.createElement('div'); msg.className='msg ai'; msg.id='typingMsg'; msg.innerHTML='<div class="typing"><span></span><span></span><span></span></div>'; messagesEl.appendChild(msg); messagesEl.scrollTop=messagesEl.scrollHeight; }
  function removeTyping() { const t=$('typingMsg'); if(t) t.remove(); }
  async function sendMessage() {
    const text=inputBox.value.trim(); if(!text||isLoading) return;
    isLoading=true; sendBtn.disabled=true; inputBox.value=''; inputBox.style.height='auto';
    addMessage('user',text); history.push({role:'user',content:text}); addTyping();
    const memory=(localStorage.getItem('chat_memory')||'').trim();
    const body={model:MODEL,max_tokens:1000,messages:history};
    if(memory) body.system=memory;
    try {
      const res=await fetch(apiUrl+'/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify(body)});
      if(res.status===401||res.status===403){ localStorage.removeItem('chat_api_key'); throw new Error('API Key 已失效，请刷新重新输入'); }
      const data=await res.json(); const reply=data.content?.[0]?.text||'（无回复）';
      removeTyping(); addMessage('ai',reply); history.push({role:'assistant',content:reply});
    } catch(e) { removeTyping(); addMessage('ai',e.message||'出错了，请重试'); }
    isLoading=false; sendBtn.disabled=!inputBox.value.trim();
  }
  init();
</script>
</body>
</html>
