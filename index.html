<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>对话</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--text:#111111;--text-muted:#aaaaaa;
  --border:#ebebeb;--user-bg:#f4f4f4;--accent:#111111;--radius:18px;
  --chat-bg:var(--bg);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Serif SC',serif;font-weight:300;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative;overflow:hidden}

/* Splash */
#splash{position:fixed;inset:0;background:var(–bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.splash-ring{width:48px;height:48px;border:1.5px solid var(–border);border-top-color:var(–accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.splash-text{font-size:12px;color:var(–text-muted);letter-spacing:0.1em;font-family:‘DM Mono’,monospace}

/* Setup */
#setup{position:fixed;inset:0;background:var(–bg);z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;gap:14px;overflow-y:auto}
#setup h2{font-size:16px;font-weight:300;letter-spacing:0.08em;text-align:center;margin-bottom:4px}
#setup p{font-size:12px;color:var(–text-muted);text-align:center;line-height:1.9;max-width:280px}
.setup-label{width:100%;max-width:320px;font-size:11px;color:var(–text-muted);font-family:‘DM Mono’,monospace;letter-spacing:0.04em;margin-bottom:2px;text-align:left}
.setup-input{width:100%;max-width:320px;border:1px solid var(–border);border-radius:12px;padding:12px 14px;font-size:13px;font-family:‘DM Mono’,monospace;outline:none;color:var(–text);background:var(–bg);transition:border-color 0.2s;-webkit-appearance:none}
.setup-input:focus{border-color:var(–accent)}
.setup-btn{width:100%;max-width:320px;background:var(–accent);color:white;border:none;border-radius:12px;padding:13px;font-size:14px;font-family:‘Noto Serif SC’,serif;font-weight:300;letter-spacing:0.08em;cursor:pointer;transition:opacity 0.2s;-webkit-tap-highlight-color:transparent}
.setup-btn:active{opacity:0.7}
.setup-btn:disabled{opacity:0.3}
.error-msg{font-size:11px;color:#e05555;text-align:center;font-family:‘DM Mono’,monospace;min-height:14px}

/* Header */
.header{padding:16px 18px 12px;border-bottom:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(–bg);z-index:10}
.header-left{display:flex;align-items:center;gap:10px}
.ai-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1px solid var(–border);background:var(–user-bg);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden}
.ai-avatar img{width:100%;height:100%;object-fit:cover}
.header-name{font-size:14px;letter-spacing:0.06em;color:var(–text)}
.header-actions{display:flex;align-items:center;gap:12px}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px;color:var(–text-muted);line-height:1;-webkit-tap-highlight-color:transparent;transition:color 0.2s;font-size:17px}
.icon-btn:active{color:var(–text)}
.txt-btn{font-size:11px;font-family:‘DM Mono’,monospace;letter-spacing:0.04em}
.status-dot{width:6px;height:6px;border-radius:50%;background:#ddd;transition:background 0.3s}
.status-dot.on{background:#4caf50}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:22px 16px;display:flex;flex-direction:column;gap:18px;scroll-behavior:smooth;background:var(–chat-bg)}
.messages::-webkit-scrollbar{display:none}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(–text-muted);font-size:12px;letter-spacing:0.08em;pointer-events:none}
.empty-glyph{font-size:24px;opacity:0.2;font-family:‘DM Mono’,monospace}
.msg{display:flex;flex-direction:column;gap:4px;animation:fadeUp 0.25s ease forwards;opacity:0}
.msg.user{align-items:flex-end}
.msg.ai{align-items:flex-start}
.msg.ai .msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-avatar{width:26px;height:26px;border-radius:50%;border:1px solid var(–border);background:var(–user-bg);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;overflow:hidden}
.msg-avatar img{width:100%;height:100%;object-fit:cover}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.bubble{max-width:82%;padding:10px 14px;font-size:15px;line-height:1.75;white-space:pre-wrap;word-break:break-word}
.msg.user .bubble{background:var(–user-bg);border-radius:var(–radius) var(–radius) 4px var(–radius)}
.msg.ai .bubble{background:transparent;padding-left:2px}
.msg-time{font-size:10px;color:var(–text-muted);font-family:‘DM Mono’,monospace;padding:0 3px}
.typing{display:flex;gap:5px;align-items:center;padding:10px 2px}
.typing span{width:4px;height:4px;border-radius:50%;background:#ccc;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* Input */
.input-area{padding:8px 12px 16px;border-top:1px solid var(–border);flex-shrink:0;background:var(–bg)}
.input-row{display:flex;align-items:flex-end;gap:8px;background:var(–user-bg);border-radius:22px;padding:9px 10px 9px 14px}
textarea{flex:1;background:transparent;border:none;outline:none;resize:none;font-family:‘Noto Serif SC’,serif;font-weight:300;font-size:15px;line-height:1.6;color:var(–text);max-height:100px;overflow-y:auto;-webkit-appearance:none}
textarea::placeholder{color:var(–text-muted)}
textarea::-webkit-scrollbar{display:none}
.send-btn{width:32px;height:32px;border-radius:50%;background:var(–accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.2s,transform 0.15s;-webkit-tap-highlight-color:transparent}
.send-btn:active{transform:scale(0.9)}
.send-btn:disabled{opacity:0.2;cursor:default}
.send-btn svg{width:14px;height:14px;fill:none;stroke:white;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* Panel base */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.1);z-index:50;opacity:0;pointer-events:none;transition:opacity 0.25s}
.panel-overlay.open{opacity:1;pointer-events:all}
.side-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:var(–bg);border-radius:20px 20px 0 0;border-top:1px solid var(–border);z-index:51;transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);display:flex;flex-direction:column;max-height:88dvh}
.side-panel.open{transform:translateX(-50%) translateY(0)}
.panel-handle{width:32px;height:3px;border-radius:2px;background:var(–border);margin:10px auto 0}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid var(–border)}
.panel-title{font-size:13px;letter-spacing:0.08em;color:var(–text-muted)}
.panel-close{background:none;border:none;font-size:20px;color:var(–text-muted);cursor:pointer;padding:2px;line-height:1;-webkit-tap-highlight-color:transparent}
.panel-body{flex:1;overflow-y:auto;padding:16px 18px}
.panel-body::-webkit-scrollbar{display:none}
.panel-footer{padding:10px 18px 24px;border-top:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;gap:10px}

/* Memory panel */
.memory-textarea{width:100%;min-height:140px;border:none;outline:none;resize:none;font-family:‘Noto Serif SC’,serif;font-weight:300;font-size:14px;line-height:1.9;color:var(–text);background:transparent;-webkit-appearance:none}
.memory-textarea::placeholder{color:var(–text-muted)}
.memory-hint{font-size:11px;color:var(–text-muted);font-family:‘DM Mono’,monospace;line-height:1.6}
.saved-flash{font-size:11px;color:#4caf50;font-family:‘DM Mono’,monospace;opacity:0;transition:opacity 0.3s;margin-top:3px}
.saved-flash.show{opacity:1}
.action-btn{background:var(–accent);color:white;border:none;border-radius:10px;padding:9px 20px;font-size:13px;font-family:‘Noto Serif SC’,serif;font-weight:300;letter-spacing:0.06em;cursor:pointer;transition:opacity 0.2s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.action-btn:active{opacity:0.7}
.action-btn.secondary{background:transparent;color:var(–text);border:1px solid var(–border)}

/* Settings panel */
.setting-row{margin-bottom:20px}
.setting-label{font-size:11px;color:var(–text-muted);font-family:‘DM Mono’,monospace;letter-spacing:0.04em;margin-bottom:6px}
.setting-input{width:100%;border:1px solid var(–border);border-radius:10px;padding:10px 12px;font-size:13px;font-family:‘DM Mono’,monospace;outline:none;color:var(–text);background:var(–bg);transition:border-color 0.2s;-webkit-appearance:none}
.setting-input:focus{border-color:var(–accent)}
.model-grid{display:flex;flex-direction:column;gap:6px}
.model-option{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(–border);border-radius:10px;cursor:pointer;transition:border-color 0.15s;-webkit-tap-highlight-color:transparent}
.model-option.selected{border-color:var(–accent);background:var(–user-bg)}
.model-option input{display:none}
.model-name{font-size:13px;font-family:‘DM Mono’,monospace;color:var(–text)}
.model-desc{font-size:11px;color:var(–text-muted);margin-top:1px}
.model-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(–border);flex-shrink:0;transition:all 0.15s}
.model-option.selected .model-dot{border-color:var(–accent);background:var(–accent)}
.temp-row{display:flex;align-items:center;gap:10px}
.temp-slider{flex:1;-webkit-appearance:none;height:2px;background:var(–border);border-radius:1px;outline:none}
.temp-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(–accent);cursor:pointer}
.temp-val{font-size:12px;font-family:‘DM Mono’,monospace;color:var(–text);min-width:28px;text-align:right}
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color 0.15s;-webkit-tap-highlight-color:transparent}
.color-swatch.selected{border-color:var(–accent)}
.avatar-preview{width:48px;height:48px;border-radius:50%;border:1px solid var(–border);background:var(–user-bg);display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;margin-bottom:8px}
.avatar-preview img{width:100%;height:100%;object-fit:cover}
.avatar-url-input{width:100%;border:1px solid var(–border);border-radius:10px;padding:9px 12px;font-size:12px;font-family:‘DM Mono’,monospace;outline:none;color:var(–text);background:var(–bg);-webkit-appearance:none}
.avatar-url-input:focus{border-color:var(–accent)}
.emoji-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.emoji-opt{width:36px;height:36px;border-radius:50%;border:1px solid var(–border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.emoji-opt.selected{border-color:var(–accent);background:var(–user-bg)}
</style>

</head>

<script>
const S = k => localStorage.getItem(k);
const W = (k,v) => localStorage.setItem(k,v);
const $ = id => document.getElementById(id);

let apiUrl = S('c_url')||'';
let apiKey = S('c_key')||'';
let model = S('c_model')||'claude-sonnet-4-5-20250929';
let temp = parseFloat(S('c_temp')||'0.7');
let history = [], isLoading = false;

// ── Splash ──
document.addEventListener("DOMContentLoaded", () => {
  setTimeout(() => {
    $('splash').style.transition='opacity 0.4s';
    $('splash').style.opacity='0';
    setTimeout(()=>{ $('splash').style.display='none'; init(); }, 450);
  }, 600);
});

function init() {
  if (apiKey && apiUrl) {
    $('statusDot').classList.add('on');
  } else {
    $('setup').style.display='flex';
  }
  $('memoryText').value = S('c_memory')||'';
  loadSettings();
}

// ── Setup ──
$('su_btn').addEventListener('click', async () => {
  let url = $('su_url').value.trim().replace(/\/$/,'');
  const key = $('su_key').value.trim();
  if (!url) { $('su_err').textContent='请输入 API 地址'; return; }
  if (!key)  { $('su_err').textContent='请输入 API Key'; return; }
  if (!url.endsWith('/v1')) url += '/v1';
  $('su_btn').disabled=true; $('su_btn').textContent='连接中…'; $('su_err').textContent='';
  try {
    const res = await fetch(url+'/messages',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model,max_tokens:10,messages:[{role:'user',content:'hi'}]})});
    if (res.status===401||res.status===403) throw new Error('Key 无效或没有权限');
    apiUrl=url; apiKey=key; W('c_url',url); W('c_key',key);
    $('setup').style.display='none'; $('statusDot').classList.add('on');
    $('set_url').value=url; $('set_key').value='';
  } catch(e) {
    $('su_err').textContent=e.message||'连接失败，检查地址和 Key';
    $('su_btn').disabled=false; $('su_btn').textContent='开始对话';
  }
});

// ── Memory ──
$('memoryBtn').addEventListener('click',()=>{ $('memOverlay').classList.add('open'); $('memPanel').classList.add('open'); });
const closeMem=()=>{ $('memOverlay').classList.remove('open'); $('memPanel').classList.remove('open'); };
$('memClose').addEventListener('click',closeMem);
$('memOverlay').addEventListener('click',closeMem);
$('saveMemBtn').addEventListener('click',()=>{ W('c_memory',$('memoryText').value); flash('memSaved'); });

// ── Settings ──
$('settingsBtn').addEventListener('click',()=>{ $('setOverlay').classList.add('open'); $('setPanel').classList.add('open'); });
const closeSet=()=>{ $('setOverlay').classList.remove('open'); $('setPanel').classList.remove('open'); };
$('setClose').addEventListener('click',closeSet);
$('setOverlay').addEventListener('click',closeSet);

function loadSettings() {
  // model
  const m = S('c_model')||'claude-sonnet-4-5-20250929';
  document.querySelectorAll('.model-option').forEach(el=>{
    el.classList.toggle('selected', el.dataset.model===m);
  });
  // temp
  const t = parseFloat(S('c_temp')||'0.7');
  $('tempSlider').value=t; $('tempVal').textContent=t.toFixed(2);
  // bg
  const bg = S('c_bg')||'#ffffff';
  document.documentElement.style.setProperty('--chat-bg', bg);
  document.querySelectorAll('.color-swatch').forEach(el=>{
    el.classList.toggle('selected', el.dataset.color===bg);
  });
  // avatar
  const av = S('c_avatar')||'◌';
  const avUrl = S('c_avatarUrl')||'';
  setAvatar(av, avUrl);
  $('avatarUrl').value = avUrl;
  document.querySelectorAll('.emoji-opt').forEach(el=>{
    el.classList.toggle('selected', el.dataset.emoji===av && !avUrl);
  });
  // name
  const name = S('c_name')||'对话';
  $('aiName').value = name;
  $('headerName').textContent = name;
  // api fields
  $('set_url').value = apiUrl;
}

function setAvatar(emoji, url) {
  const preview = $('avatarPreview');
  const header = $('headerAvatar');
  if (url) {
    preview.innerHTML = `<img src="${url}" onerror="this.parentElement.textContent='◌'">`;
    header.innerHTML = `<img src="${url}" onerror="this.parentElement.textContent='◌'">`;
  } else {
    preview.textContent = emoji||'◌';
    header.textContent = emoji||'◌';
  }
}

// Model select
document.querySelectorAll('.model-option').forEach(el=>{
  el.addEventListener('click',()=>{
    document.querySelectorAll('.model-option').forEach(e=>e.classList.remove('selected'));
    el.classList.add('selected');
  });
});

// Temp slider
$('tempSlider').addEventListener('input',()=>{
  $('tempVal').textContent = parseFloat($('tempSlider').value).toFixed(2);
});

// BG color
document.querySelectorAll('.color-swatch').forEach(el=>{
  el.addEventListener('click',()=>{
    document.querySelectorAll('.color-swatch').forEach(e=>e.classList.remove('selected'));
    el.classList.add('selected');
    const dark = el.dataset.color==='#1a1a1a';
    document.documentElement.style.setProperty('--chat-bg', el.dataset.color);
    if (dark) {
      document.documentElement.style.setProperty('--text-muted','#666');
    } else {
      document.documentElement.style.setProperty('--text-muted','#aaaaaa');
    }
  });
});

// Emoji avatar
document.querySelectorAll('.emoji-opt').forEach(el=>{
  el.addEventListener('click',()=>{
    document.querySelectorAll('.emoji-opt').forEach(e=>e.classList.remove('selected'));
    el.classList.add('selected');
    $('avatarUrl').value='';
    setAvatar(el.dataset.emoji,'');
  });
});

// Avatar URL
$('avatarUrl').addEventListener('input',()=>{
  const url=$('avatarUrl').value.trim();
  if (url) { setAvatar('',''+url); document.querySelectorAll('.emoji-opt').forEach(e=>e.classList.remove('selected')); }
});

// Save settings
$('saveSetBtn').addEventListener('click', async ()=>{
  const selModel = document.querySelector('.model-option.selected');
  if (selModel) { model=selModel.dataset.model; W('c_model',model); }
  temp=parseFloat($('tempSlider').value); W('c_temp',temp);
  const selBg = document.querySelector('.color-swatch.selected');
  if (selBg) W('c_bg',selBg.dataset.color);
  const name = $('aiName').value.trim()||'对话';
  W('c_name',name); $('headerName').textContent=name;
  const avUrl=$('avatarUrl').value.trim();
  const selEmoji=document.querySelector('.emoji-opt.selected');
  const av=selEmoji?selEmoji.dataset.emoji:'◌';
  W('c_avatar',av); W('c_avatarUrl',avUrl); setAvatar(av,avUrl);
  // api
  let url=$('set_url').value.trim().replace(/\/$/,'');
  const key=$('set_key').value.trim();
  if (url) { if(!url.endsWith('/v1')) url+='/v1'; apiUrl=url; W('c_url',url); }
  if (key) { apiKey=key; W('c_key',key); }
  if (apiUrl&&apiKey) $('statusDot').classList.add('on');
  flash('setSaved'); $('set_err').textContent='';
});

function flash(id) {
  const el=$(id); el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),1800);
}

// ── Chat ──
$('inputBox').addEventListener('input',()=>{
  $('inputBox').style.height='auto';
  $('inputBox').style.height=Math.min($('inputBox').scrollHeight,100)+'px';
  $('sendBtn').disabled=!$('inputBox').value.trim()||isLoading;
});
$('inputBox').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!$('sendBtn').disabled)sendMsg();}
});
$('sendBtn').addEventListener('click',sendMsg);
$('clearBtn').addEventListener('click',()=>{
  history=[];
  const msgs=$('messages');
  msgs.innerHTML='';
  msgs.appendChild($('emptyState'));
  $('emptyState').style.display='flex';
});

function getTime(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}

function getMsgAvatar(){
  const avUrl=S('c_avatarUrl')||'';
  const av=S('c_avatar')||'◌';
  if(avUrl) return `<div class="msg-avatar"><img src="${avUrl}" onerror="this.parentElement.textContent='◌'"></div>`;
  return `<div class="msg-avatar">${av}</div>`;
}

function addMsg(role,text){
  $('emptyState').style.display='none';
  const msg=document.createElement('div');msg.className=`msg ${role}`;
  if(role==='ai'){
    const row=document.createElement('div');row.className='msg-row';
    row.innerHTML=getMsgAvatar();
    const bubble=document.createElement('div');bubble.className='bubble';bubble.textContent=text;
    row.appendChild(bubble);msg.appendChild(row);
  } else {
    const bubble=document.createElement('div');bubble.className='bubble';bubble.textContent=text;
    msg.appendChild(bubble);
  }
  const time=document.createElement('div');time.className='msg-time';time.textContent=getTime();
  msg.appendChild(time);
  $('messages').appendChild(msg);
  $('messages').scrollTop=$('messages').scrollHeight;
  return msg;
}

function addTyping(){
  $('emptyState').style.display='none';
  const msg=document.createElement('div');msg.className='msg ai';msg.id='typingMsg';
  const row=document.createElement('div');row.className='msg-row';
  row.innerHTML=getMsgAvatar()+'<div class="typing"><span></span><span></span><span></span></div>';
  msg.appendChild(row);$('messages').appendChild(msg);$('messages').scrollTop=$('messages').scrollHeight;
}
function removeTyping(){const t=$('typingMsg');if(t)t.remove();}

async function sendMsg(){
  const text=$('inputBox').value.trim();
  if(!text||isLoading)return;
  isLoading=true;$('sendBtn').disabled=true;$('inputBox').value='';$('inputBox').style.height='auto';
  addMsg('user',text);history.push({role:'user',content:text});addTyping();
  const memory=(S('c_memory')||'').trim();
  const body={model,max_tokens:1000,temperature:temp,messages:history};
  if(memory)body.system=memory;
  try{
    const res=await fetch(apiUrl+'/messages',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify(body)});
    if(res.status===401||res.status===403){W('c_key','');throw new Error('API Key 已失效，请在设置里重新输入');}
    const data=await res.json();
    const reply=data.content?.[0]?.text||'（无回复）';
    removeTyping();addMsg('ai',reply);history.push({role:'assistant',content:reply});
  }catch(e){removeTyping();addMsg('ai',e.message||'出错了，请重试');}
  isLoading=false;$('sendBtn').disabled=!$('inputBox').value.trim();
}
</script>
